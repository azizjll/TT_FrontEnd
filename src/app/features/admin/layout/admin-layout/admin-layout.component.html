<!-- admin-layout.component.html -->
<div class="dg-wrapper">

  <!-- Sidebar -->
  <app-sidebar
    [nomUtilisateur]="nomUtilisateur"
    [roleUtilisateur]="roleUtilisateur"
    [sidebarOpen]="sidebarOpen"
    [totalCandidatures]="totalCandidatures"
    [totalSaisonniers]="totalSaisonniers"
    (sectionChanged)="onSectionChanged($event)"
    (sidebarClosed)="closeSidebar()"
    (logoutRequested)="logout()">
  </app-sidebar>

  <!-- Overlay mobile -->
  <div class="sidebar-overlay"
       [class.visible]="sidebarOpen"
       (click)="closeSidebar()">
  </div>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Top Bar -->
    <header class="topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="burger-btn" (click)="toggleSidebar()" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="topbar-left">
          <h1 class="page-title">{{ pageTitle }}</h1>
          <p class="page-subtitle">{{ pageSubtitle }}</p>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" placeholder="Rechercher..." [(ngModel)]="searchQuery" />
        </div>
        <div class="notification-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-dot"></span>
        </div>
      </div>
    </header>

    <!-- Router outlet : chaque section est une route -->
    <div class="router-content">
      <router-outlet></router-outlet>
    </div>

  </main>

  <!-- Toast global -->
  <div class="toast-notification" *ngIf="showToastFlag">
    {{ toastMessage }}
  </div>

</div>
