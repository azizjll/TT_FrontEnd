
<body>

  <main>
    <div class="page-card">

      <!-- TITRE PAGE -->
      <h1 class="page-title">Paramètres de l'entreprise</h1>

      <!-- ONGLETS -->
      <nav class="tabs">
        <a href="#" class="tab active">Général</a>
        <a href="#" class="tab">Conditions d'utilisation</a>
        
        <a href="#" class="tab">Mon entreprise</a>
      </nav>

      <hr class="divider">

      <!-- SECTION 1 : Informations sur l'entreprise -->
      <section class="form-section">
        <h2 class="section-title">Informations sur l'entreprise</h2>

        <!-- Logo upload -->
        <div class="logo-upload">
          <div class="logo-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2b4cdb" stroke-width="1.8">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
          </div>
          <button class="edit-icon" title="Modifier le logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>

        <!-- Raison sociale + Siret -->
        <div class="form-row two-col">
          <div class="form-group">
            <label>Raison sociale</label>
            <input type="text" value="RIF RASSEMBLEMENT DES INGENIEURS FR...">
          </div>
          <div class="form-group">
            <label>Siret</label>
            <input type="text" value="83897535700024">
          </div>
        </div>
      </section>

      <!-- SECTION 2 : Informations sur l'entreprise (adresse) -->
      <section class="form-section">
        <h2 class="section-title">Informations sur l'entreprise</h2>

        <!-- Pays -->
        <div class="form-group">
          <label>Pays</label>
          <select>
            <option selected>France</option>
            <option>Belgique</option>
            <option>Suisse</option>
            <option>Canada</option>
          </select>
        </div>

        <!-- Adresse 1 -->
        <div class="form-group">
          <label>Adresse 1</label>
          <input type="text" value="2 B RUE ALFRED NOBEL">
        </div>

        <!-- Adresse 2 + Code postal -->
        <div class="form-row two-col">
          <div class="form-group">
            <label>Adresse 2 (numéro, block, porte...)</label>
            <input type="text" value="2">
          </div>
          <div class="form-group">
            <label>Code postal</label>
            <input type="text" value="77420">
          </div>
        </div>

        <!-- Ville + Province -->
        <div class="form-row two-col">
          <div class="form-group">
            <label>Ville</label>
            <input type="text" value="CHAMPS-SUR-MARNE">
          </div>
          <div class="form-group">
            <label>Province/Région</label>
            <input type="text" value="Île-de-France">
          </div>
        </div>

        <!-- État/Province/Région -->
        <div class="form-group">
          <label>État/Province/Région</label>
          <select>
            <option selected>France</option>
            <option>Île-de-France</option>
            <option>Provence-Alpes-Côte d'Azur</option>
          </select>
        </div>

      </section>

      <!-- BOUTON ENREGISTRER -->
      <div class="form-actions">
        <button class="btn-save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Enregistrer
        </button>
      </div>

    </div>
  </main>

  <!-- ASSISTANCE -->
  <button class="assistance-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 16v-4M12 8h.01"/>
    </svg>
    Assistance
  </button>

</body>
