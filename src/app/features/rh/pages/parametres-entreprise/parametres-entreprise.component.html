
<body>

  <main>
<main>
  <div class="page-card">

    <h1 class="page-title">Paramètres de l'entreprise</h1>

    <nav class="tabs">
      <a href="#" class="tab active">Général</a>
      <a href="#" class="tab">Conditions d'utilisation</a>
      <a href="#" class="tab">Mon entreprise</a>
    </nav>

    <hr class="divider">

    <!-- Messages -->
    <div *ngIf="messageSucces" class="alert alert-success">{{ messageSucces }}</div>
    <div *ngIf="messageErreur" class="alert alert-error">{{ messageErreur }}</div>

    <!-- Chargement -->
    <div *ngIf="isLoading" style="text-align:center; padding: 2rem;">
      Chargement...
    </div>

    <!-- Liste des campagnes -->
    <ng-container *ngIf="!isLoading">
      <section class="form-section" *ngFor="let campagne of campagnes">
        <h2 class="section-title">
          {{ campagne.libelle }}
          <span [class]="getStatutClass(campagne.statut)">{{ campagne.statut }}</span>
        </h2>

        <div class="form-row two-col">
          <div class="form-group">
            <label>Code</label>
            <input type="text" [value]="campagne.code" readonly>
          </div>
          <div class="form-group">
            <label>Budget</label>
            <input type="text" [value]="campagne.budget + ' €'" readonly>
          </div>
        </div>

        <div class="form-row two-col">
          <div class="form-group">
            <label>Date début</label>
            <input type="text" [value]="campagne.dateDebut" readonly>
          </div>
          <div class="form-group">
            <label>Date fin</label>
            <input type="text" [value]="campagne.dateFin" readonly>
          </div>
        </div>

        <div class="form-group">
          <label>Description</label>
          <input type="text" [value]="campagne.description" readonly>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <button class="btn-save"
                  *ngIf="campagne.statut === 'BROUILLON'"
                  (click)="activer(campagne.id)">
            Activer
          </button>
          <button class="btn-save"
                  *ngIf="campagne.statut === 'ACTIVE'"
                  (click)="cloturer(campagne.id)">
            Clôturer
          </button>
          <button class="btn-delete"
                  (click)="supprimer(campagne.id)">
            Supprimer
          </button>
        </div>
      </section>

      <!-- Aucune campagne -->
      <p *ngIf="campagnes.length === 0" style="text-align:center; color: gray;">
        Aucune campagne trouvée.
      </p>
    </ng-container>

  </div>
</main>

<button class="assistance-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="10"/>
    <path d="M12 16v-4M12 8h.01"/>
  </svg>
  Assistance
</button>
  </main>

  <!-- ASSISTANCE -->
  <button class="assistance-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 16v-4M12 8h.01"/>
    </svg>
    Assistance
  </button>

</body>
